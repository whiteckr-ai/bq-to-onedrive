name: bq-to-kdocs

on:
  workflow_dispatch: {}
  schedule:
    - cron: "45 * * * *"   # UTC 기준

jobs:
  export-and-upload:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 1) GCP 인증
      - name: Auth to GCP
        id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.SERVICE_ACCOUNT_JSON }}

      # 2) gcloud/bq 설치
      - name: Install gcloud & bq
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}
          install_components: bq

      # 진단 (문제 발생 시 유용)
      - name: Check gcloud/bq
        run: |
          gcloud --version
          bq version
          gcloud auth list
          gcloud config list

      # 스모크 테스트
      - name: Smoke test - SELECT 1
        run: |
          bq query \
            --project_id="${{ secrets.GCP_PROJECT_ID }}" \
            --location=asia-northeast3 \
            --nouse_legacy_sql \
            --format=csv \
            "SELECT 1 AS ok"

      # 3) BigQuery → CSV 추출
      - name: Export BigQuery result to CSV
        env:
          BQ_SQL: ${{ secrets.BQ_SQL }}
        run: |
          set -euo pipefail
          if [ -z "${BQ_SQL:-}" ]; then
            echo "ERROR: BQ_SQL secret is empty."; exit 1
          fi
          printf '%s' "$BQ_SQL" > /tmp/query.sql
          mkdir -p /tmp/export
          bq query \
            --project_id="${{ secrets.GCP_PROJECT_ID }}" \
            --location=asia-northeast3 \
            --nouse_legacy_sql \
            --format=csv \
            --max_rows=1000000000 \
            < /tmp/query.sql | tee /tmp/export/bq_export.csv > /dev/null

      - name: Check CSV row count & size
        run: |
          ls -l /tmp/export/bq_export.csv || true
          echo "Line count (including header):"
          wc -l /tmp/export/bq_export.csv || true
          echo "Head:"; head -n 5 /tmp/export/bq_export.csv || true

      # =========================================================
      # 4) KDocs 연동
      # =========================================================

      - name: Install Python dependencies
        run: pip install --quiet requests

      - name: Send CSV Data to KDocs
        env:
          # KDocs 관련 설정 (직접 기재)
          KDOCS_TOKEN: "1Vg353OyhzW3n27xfSZKUh"
          KDOCS_FILE_ID: "cvViOvb7vj6x"
          KDOCS_DB_FILE_ID: "cnIgZYoMts1i"
          
        run: |
          cp /tmp/export/bq_export.csv result.csv
          
          echo "========================================"
          echo "1️⃣ 일반 AirSheet 업데이트 시작"
          echo "========================================"
          KDOCS_TARGET_FILE_ID=${{ env.KDOCS_FILE_ID }} \
          KDOCS_SCRIPT_NAME="V2-7ywFu9flguvfUNoAffFcws" \
          KDOCS_MODE="sheet" \
          python send_to_kdocs.py
          
          echo ""
          echo "========================================"
          echo "2️⃣ KDocs DB 업데이트 시작"
          echo "========================================"
          KDOCS_TARGET_FILE_ID=${{ env.KDOCS_DB_FILE_ID }} \
          KDOCS_SCRIPT_NAME="V2-5vnUpdVQGXoWN9loeiAx39" \
          KDOCS_MODE="db" \
          python send_to_kdocs.py
          
          echo ""
          echo "🎉 모든 KDocs 업데이트 작업 완료!"
